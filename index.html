<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sango Music</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header>
  <div class="logo">🎵 Sango</div>
  <div class="searchbar">
    <input id="searchInput" type="text" placeholder="Search any song, artist..."/>
    <button id="searchBtn">Search</button>
  </div>
</header>

<div class="layout">

  <main>
    <div id="status" class="status">Search for a song above to start listening</div>
    <div id="results"></div>
  </main>

  <aside id="sidebar">
    <div class="sidebar-head">
      <span>Queue</span>
      <button id="clearBtn">Clear</button>
    </div>
    <ul id="queueList">
      <li class="q-empty">Queue is empty</li>
    </ul>
  </aside>

</div>

<div id="queueFab">🎵</div>

<footer id="player">
  <div class="pl-left">
    <img id="pImg" src="" alt=""/>
    <div class="pl-meta">
      <div id="pTitle">No song playing</div>
      <div id="pArtist"></div>
    </div>
  </div>

  <div class="pl-center">
    <div class="pl-btns">
      <button id="prevBtn">⏮</button>
      <button id="playBtn" class="playmain">▶</button>
      <button id="nextBtn">⏭</button>
    </div>
    <div class="pl-progress">
      <span id="curTime">0:00</span>
      <div id="bar"><div id="barFill"></div></div>
      <span id="endTime">0:00</span>
    </div>
  </div>

  <div class="pl-right">
    <span class="vol-label">🔊</span>
    <input type="range" id="vol" min="0" max="1" step="0.02" value="0.85"/>
  </div>
</footer>

<audio id="audio"></audio>
<script src="script.js"></script>
</body>
</html>
