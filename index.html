<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Sango Music</title>

<style>

body{
background:#121212;
color:white;
font-family:Arial;
text-align:center;
}

input{
padding:10px;
width:250px;
}

button{
padding:10px;
background:#1db954;
border:none;
color:white;
cursor:pointer;
margin:5px;
}

.track{
background:#1e1e1e;
margin:15px auto;
padding:10px;
width:350px;
border-radius:8px;
}

</style>

</head>

<body>

<h1>Sango Music</h1>

<input id="searchInput" placeholder="Search song">
<button onclick="searchSongs()">Search</button>

<h2>Results</h2>
<div id="results"></div>

<h2>Now Playing</h2>
<div id="player"></div>

<h2>Queue</h2>
<ul id="queue"></ul>

<script>

let queue=[]

async function searchSongs(){

const query=document.getElementById("searchInput").value

const url=`https://spotify23.p.rapidapi.com/search/?q=${query}&type=tracks&limit=6`

const options={
method:'GET',
headers:{
'X-RapidAPI-Key':'YOUR_API_KEY',
'X-RapidAPI-Host':'spotify23.p.rapidapi.com'
}
}

const response=await fetch(url,options)
const data=await response.json()

const tracks=data.tracks.items

let html=""

tracks.forEach(t=>{

const track=t.data

html+=`
<div class="track">
<p>${track.name} - ${track.artists.items[0].profile.name}</p>

<button onclick="playSong('${track.id}')">Play</button>

<button onclick="addQueue('${track.id}','${track.name}')">
Add to Queue
</button>

</div>
`

})

document.getElementById("results").innerHTML=html
}

function playSong(id){

document.getElementById("player").innerHTML=
`<iframe src="https://open.spotify.com/embed/track/${id}" width="320" height="80" frameborder="0" allow="encrypted-media"></iframe>`

}

function addQueue(id,name){

queue.push({id,name})
updateQueue()

}

function updateQueue(){

let html=""

queue.forEach(song=>{
html+=`<li>${song.name}</li>`
})

document.getElementById("queue").innerHTML=html

}

</script>

</body>
</html>
