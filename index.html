<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sango Music</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Sango Music</h1>

<input type="text" id="searchInput" placeholder="Search songs or artists">
<button onclick="searchMusic()">Search</button>

</header>

<main>

<div id="results" class="results"></div>

</main>

<footer>

<div class="player">

<img id="cover" src="" />

<div class="info">
<div id="title">No song</div>
<div id="artist">Select music</div>
</div>

<div class="controls">
<button onclick="previousSong()">⏮</button>
<button onclick="togglePlay()" id="playBtn">▶</button>
<button onclick="nextSong()">⏭</button>
</div>

</div>

<input type="range" id="progress" value="0">

</footer>

<audio id="audio"></audio>

<script src="script.js"></script>

</body>
</html>
