<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sango Music</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h1>Sango Music</h1>

<input id="searchInput" placeholder="Search songs or artists">
<button onclick="searchMusic()">Search</button>

</header>

<main>

<div id="results" class="results"></div>

</main>

<!-- Queue Button -->

<div class="queue-circle" onclick="toggleQueue()">🎵</div>

<!-- Queue Panel -->

<div id="queuePanel" class="queue-panel">

<h3>Queue</h3>

<ul id="queueList"></ul>

<button onclick="clearQueue()">Clear</button>

</div>

<!-- Bottom Player -->

<footer>

<img id="cover">

<div class="track-info">

<div id="title">No song</div>
<div id="artist"></div>

</div>

<div class="controls">

<button onclick="previousSong()">⏮</button>
<button onclick="togglePlay()" id="playBtn">▶</button>
<button onclick="nextSong()">⏭</button>

</div>

<div class="time">

<span id="currentTime">0:00</span>

<input type="range" id="progress">

<span id="duration">0:00</span>

</div>

</footer>

<audio id="audio"></audio>

<script src="script.js"></script>

</body>
</html>
